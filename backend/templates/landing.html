<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- ====== OG META TAGS (Dùng để hiện preview đẹp trên Facebook/Zalo) ====== -->
    <meta property="og:title" content="{{ og_title }}" />
    <meta property="og:description" content="{{ og_description }}" />
    <meta property="og:image" content="{{ og_image }}" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:url" content="{{ og_url }}" />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="{{ og_title }}" />
    <meta name="twitter:description" content="{{ og_description }}" />
    <meta name="twitter:image" content="{{ og_image }}" />

    <title>{{ og_title }}</title>

    <style>
        /* ===================================================
           BASE STYLES
        =================================================== */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: #0f0f0f;
            color: #e0e0e0;
            font-family: 'Segoe UI', Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 16px;
        }

        /* ===================================================
           VIDEO WRAPPER — tỷ lệ 16:9 chuẩn, responsive
        =================================================== */
        .video-wrapper {
            width: 100%;
            max-width: 840px;
            margin: 20px auto 0;
        }

        /*
         * .video-container — khung giữ tỷ lệ 16:9 bằng aspect-ratio
         * position: relative để con có thể absolute fill vào
         */
        .video-container {
            position: relative;
            width: 100%;
            aspect-ratio: 16 / 9;     /* Luôn giữ tỷ lệ 16:9 dù resize */
            background: #000;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.7);
        }

        /* Iframe Ok.ru — fill toàn bộ container */
        .video-container iframe {
            position: absolute;
            inset: 0;              /* top:0; right:0; bottom:0; left:0 */
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }

        /* ===================================================
           INVISIBLE SHIELD — Lớp khiên CSS bảo vệ iframe
           Chặn người dùng click vào Logo/Tiêu đề Ok.ru
           mà bị văng sang trang Ok.ru ngoài ý muốn.
        =================================================== */

        /*
         * Lớp khiên #1: Che cạnh TRÊN của iframe (60px)
         * Ok.ru đặt tiêu đề video + logo ở đây.
         * Khi user click vào vùng này → click bị chặn bởi shield (transparent),
         * không reach được iframe → không bị pop-up Ok.ru.
         */
        .iframe-shield-top {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 60px;              /* Che phần tiêu đề + logo trên */
            background: transparent;
            z-index: 10;               /* Nằm trên iframe nhưng dưới overlay bẫy click */
            cursor: default;
        }

        /*
         * Lớp khiên #2: Che góc PHẢI DƯỚI (khoảng 120x40px)
         * Ok.ru đặt nút "Ok.ru" / watermark ở đây.
         */
        .iframe-shield-bottom-right {
            position: absolute;
            bottom: 0;
            right: 0;
            width: 140px;
            height: 48px;
            background: transparent;
            z-index: 10;
            cursor: default;
        }

        /* ===================================================
           CONTENT DESCRIPTION — Mô tả video dưới iframe
        =================================================== */
        .content-description {
            width: 100%;
            max-width: 840px;
            margin: 16px auto 0;
            padding: 16px 20px;
            background: #1a1a1a;
            border-left: 3px solid #e53935;
            border-radius: 6px;
            line-height: 1.7;
            font-size: 15px;
            color: #ccc;
        }

        /* ===================================================
           CLICK TRAP OVERLAY — Lớp bẫy click toàn màn hình
        =================================================== */
        #clickTrapOverlay {
            position: fixed;
            inset: 0;
            z-index: 9999;            /* Luôn nằm trên cùng */
            background: rgba(0, 0, 0, 0.82);
            backdrop-filter: blur(6px);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: background 0.3s ease, opacity 0.25s ease;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        /* Khi overlay đã ở "tầng 2" — trông như đã tắt quảng cáo */
        #clickTrapOverlay.stage-two {
            background: rgba(0, 0, 0, 0.08);
            backdrop-filter: blur(0px);
        }

        /* Play button wrapper — pulse animation */
        .play-button-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
            animation: pulse 1.8s ease-in-out infinite;
            transition: opacity 0.25s ease;
        }

        /* Nút Play tròn đỏ */
        .play-icon {
            width: 88px;
            height: 88px;
            background: rgba(229, 57, 53, 0.9);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 0 12px rgba(229, 57, 53, 0.2),
                        0 0 40px rgba(229, 57, 53, 0.5);
            transition: transform 0.15s ease;
        }
        .play-icon:active { transform: scale(0.93); }

        /* Tam giác Play (CSS-only) */
        .play-icon::after {
            content: '';
            display: block;
            border-style: solid;
            border-width: 16px 0 16px 28px;
            border-color: transparent transparent transparent #fff;
            margin-left: 8px;
        }

        /* Chữ dưới play button */
        .play-text {
            font-size: 17px;
            font-weight: 700;
            color: #fff;
            letter-spacing: 0.5px;
            text-shadow: 0 2px 8px rgba(0,0,0,0.8);
        }

        /* Nút "Đóng quảng cáo" giả */
        .fake-close-btn {
            position: fixed;
            top: 16px;
            right: 16px;
            z-index: 10000;
            background: rgba(255,255,255,0.12);
            color: #fff;
            border: none;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 13px;
            cursor: pointer;
            transition: opacity 0.25s ease, transform 0.25s ease;
            pointer-events: none;   /* Không click được, chỉ là mồi nhử */
        }
        .fake-close-btn.hidden {
            opacity: 0;
            transform: scale(0.8);
        }

        /* Animation */
        @keyframes pulse {
            0%   { transform: scale(1); }
            50%  { transform: scale(1.06); }
            100% { transform: scale(1); }
        }

        /* ===================================================
           FALLBACK (khi không có video Ok.ru)
        =================================================== */
        .loader-fallback {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            gap: 16px;
        }
        .spinner {
            width: 44px; height: 44px;
            border: 4px solid rgba(255,255,255,0.08);
            border-top-color: #e53935;
            border-radius: 50%;
            animation: spin 0.75s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ===================================================
           RESPONSIVE MOBILE
        =================================================== */
        @media (max-width: 600px) {
            body { padding: 8px; }
            .video-wrapper { margin-top: 10px; }
            .play-icon { width: 72px; height: 72px; }
            .play-text { font-size: 15px; }
            .content-description { font-size: 14px; padding: 12px 14px; }
            .iframe-shield-top { height: 50px; }
        }
    </style>
</head>
<body>

    {% if okru_embed_url %}
    <!-- ======================================================
         LANDING PAGE — Video Ok.ru + 2-Stage Click Trap
    ====================================================== -->

        <div class="video-wrapper">
            <!-- Khung giữ tỷ lệ 16:9 -->
            <div class="video-container" id="videoContainer">

                <!-- ✅ Iframe video Ok.ru -->
                <iframe
                    src="{{ okru_embed_url }}"
                    frameborder="0"
                    allow="autoplay; fullscreen"
                    allowfullscreen
                ></iframe>

                <!-- 🛡️ Lớp khiên #1: Che tiêu đề / logo phía TRÊN (60px) -->
                <div class="iframe-shield-top" aria-hidden="true"></div>

                <!-- 🛡️ Lớp khiên #2: Che watermark / nút Ok.ru góc PHẢI DƯỚI -->
                <div class="iframe-shield-bottom-right" aria-hidden="true"></div>

            </div><!-- /.video-container -->
        </div><!-- /.video-wrapper -->

        {% if content_description %}
        <div class="content-description">
            {{ content_description }}
        </div>
        {% endif %}

        <!-- ======================================================
             🪤 OVERLAY BẪY CLICK 2 TẦNG
             z-index: 9999 — đè lên toàn màn hình
        ====================================================== -->
        <div id="clickTrapOverlay" role="button" aria-label="Nhấn để xem video" tabindex="0">
            <div class="play-button-wrapper" id="playBtnWrapper">
                <div class="play-icon"></div>
                <div class="play-text" id="playText">Nhấn để xem video</div>
            </div>
        </div>

        <!-- Nút "Đóng quảng cáo" giả (mồi nhử) -->
        <button class="fake-close-btn" id="fakeCloseBtn" aria-hidden="true" tabindex="-1">✕ Đóng quảng cáo</button>

        <script>
        /**
         * ============================================================
         * 2-STAGE CLICK TRAP — Logic Bẫy Click 2 Tầng
         * ============================================================
         *
         * Tầng 1 (Click lần 1):
         *   → Mở Original_URL (Shopee) ở tab mới.
         *   → Overlay giữ nguyên NHƯNG chuyển sang chế độ "trong suốt"
         *     (stage-two). Nút "Đóng quảng cáo" giả biến mất → user
         *     tưởng đã bấm đúng nút đóng và quảng cáo đã tắt.
         *
         * Tầng 2 (Click lần 2):
         *   → User tưởng đang bấm vào nút Play video.
         *   → Mở Second_Affiliate_URL (TikTok) ở tab mới.
         *   → Overlay ẩn hẳn → user xem video Ok.ru bình thường.
         *
         * Lần 3+: Overlay đã biến mất, user tương tác video trực tiếp.
         */
        (function() {
            'use strict';

            /* ── Jinja2 truyền URL xuống JS ── */
            var ORIGINAL_URL = {{ original_url | tojson }};
            var SECOND_URL   = {{ second_affiliate_url | tojson if second_affiliate_url else 'null' }};

            /* ── DOM elements ── */
            var overlay      = document.getElementById('clickTrapOverlay');
            var playWrapper  = document.getElementById('playBtnWrapper');
            var playText     = document.getElementById('playText');
            var fakeCloseBtn = document.getElementById('fakeCloseBtn');

            /* ── Bộ đếm click ── */
            var clickCount = 0;

            /* ── Hàm bắt sự kiện ── */
            function handleTrap(e) {
                e.preventDefault();
                e.stopPropagation();

                if (clickCount === 0) {
                    /* ========================
                       TẦNG 1: Click lần đầu
                    ======================== */
                    // Mở Shopee (hoặc link chính) ở tab mới
                    window.open(ORIGINAL_URL, '_blank', 'noopener,noreferrer');

                    // Chuyển overlay sang chế độ "trong suốt"
                    overlay.classList.add('stage-two');

                    // Ẩn nút "Đóng quảng cáo" giả
                    if (fakeCloseBtn) {
                        fakeCloseBtn.classList.add('hidden');
                    }

                    // Đổi text thành dấu hiệu "đang load video"
                    if (playText) {
                        playText.textContent = '▶ Nhấn Play để phát';
                    }

                    clickCount = 1;

                } else if (clickCount === 1) {
                    /* ========================
                       TẦNG 2: Click lần hai
                    ======================== */
                    // Mở TikTok (link phụ) ở tab mới nếu có
                    if (SECOND_URL) {
                        window.open(SECOND_URL, '_blank', 'noopener,noreferrer');
                    }

                    // Ẩn overlay hoàn toàn — user xem video bình thường
                    overlay.style.display = 'none';
                    if (fakeCloseBtn) fakeCloseBtn.style.display = 'none';

                    // Gỡ event listener để giải phóng bộ nhớ
                    overlay.removeEventListener('click', handleTrap);
                    overlay.removeEventListener('touchstart', handleTrap);

                    clickCount = 2;
                }
            }

            /* ── Gắn sự kiện lên overlay ── */
            if (overlay) {
                overlay.addEventListener('click', handleTrap, { passive: false });
                // touchstart để mobile không bị delay 300ms
                overlay.addEventListener('touchstart', handleTrap, { passive: false });

                // Keyboard accessibility: Enter / Space cũng kích hoạt
                overlay.addEventListener('keydown', function(e) {
                    if (e.key === 'Enter' || e.key === ' ') {
                        handleTrap(e);
                    }
                });
            }

        })();
        </script>

    {% else %}
    <!-- ======================================================
         FALLBACK: Không có video → Redirect thẳng sang URL gốc
    ====================================================== -->
        <div class="loader-fallback">
            <div class="spinner"></div>
            <p>Đang chuyển hướng...</p>
        </div>
        <script>
            window.location.replace({{ original_url | tojson }});
        </script>
        <noscript>
            <meta http-equiv="refresh" content="0; url={{ original_url }}" />
        </noscript>
    {% endif %}

</body>
</html>
