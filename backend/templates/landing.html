<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- ====== OG META TAGS ====== -->
    <meta property="og:title" content="{{ og_title }}" />
    <meta property="og:description" content="{{ og_description }}" />
    <meta property="og:image" content="{{ og_image }}" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:url" content="{{ og_url }}" />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="{{ og_title }}" />
    <meta name="twitter:description" content="{{ og_description }}" />
    <meta name="twitter:image" content="{{ og_image }}" />

    <title>{{ og_title }}</title>

    <style>
        /* ===================================================
           BASE STYLES
        =================================================== */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: #0f0f0f;
            color: #e0e0e0;
            font-family: 'Segoe UI', Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 16px;
        }

        /* ===================================================
           VIDEO WRAPPER
        =================================================== */
        .video-wrapper {
            width: 100%;
            max-width: 800px;
            margin: 20px auto 0;
            position: relative; /* Để chứa End-Screen Overlay */
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 8px 32px rgba(0,0,0,0.7);
            background: #000;
        }

        #mainVideo {
            width: 100%;
            max-width: 800px;
            aspect-ratio: 16 / 9;
            background: #000;
            margin: 0 auto;
            display: block;
        }

        /* ===================================================
           END-SCREEN OVERLAY
        =================================================== */
        #endScreenOverlay {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.8);
            z-index: 20; /* Trên video, dưới bẫy click */
            display: none; /* JS sẽ bật lên */
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        #replayBtn {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(229, 57, 53, 0.9);
            color: #fff;
            border: none;
            padding: 14px 28px;
            border-radius: 50px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            letter-spacing: 0.3px;
            box-shadow: 0 4px 24px rgba(229, 57, 53, 0.5);
            transition: transform 0.15s ease, box-shadow 0.15s ease;
        }

        #replayBtn:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 32px rgba(229, 57, 53, 0.7);
        }

        #replayBtn:active { transform: scale(0.96); }

        #replayBtn::before {
            content: '▶';
            font-size: 14px;
        }

        /* ===================================================
           CONTENT DESCRIPTION
        =================================================== */
        .content-description {
            width: 100%;
            max-width: 800px;
            margin: 16px auto 0;
            padding: 16px 20px;
            background: #1a1a1a;
            border-left: 3px solid #e53935;
            border-radius: 6px;
            line-height: 1.7;
            font-size: 15px;
            color: #ccc;
        }

        /* ===================================================
           CLICK TRAP OVERLAY (Bẫy click 2 tầng)
        =================================================== */
        #clickTrapOverlay {
            position: fixed;
            inset: 0;
            z-index: 9999;
            background: rgba(0, 0, 0, 0.82);
            backdrop-filter: blur(6px);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: background 0.3s ease;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        /* Tầng 2: Trong suốt */
        #clickTrapOverlay.stage-two {
            background: rgba(0, 0, 0, 0.06);
            backdrop-filter: blur(0px);
        }

        .play-button-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
            animation: pulse 1.8s ease-in-out infinite;
        }

        .play-icon {
            width: 88px; height: 88px;
            background: rgba(229, 57, 53, 0.9);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 0 12px rgba(229, 57, 53, 0.2), 0 0 40px rgba(229, 57, 53, 0.5);
            transition: transform 0.15s ease;
        }
        .play-icon:active { transform: scale(0.93); }
        .play-icon::after {
            content: '';
            display: block;
            border-style: solid;
            border-width: 16px 0 16px 28px;
            border-color: transparent transparent transparent #fff;
            margin-left: 8px;
        }

        .play-text {
            font-size: 17px;
            font-weight: 700;
            color: #fff;
            letter-spacing: 0.5px;
            text-shadow: 0 2px 8px rgba(0,0,0,0.8);
        }

        /* Nút mồi nhử */
        .fake-close-btn {
            position: fixed;
            top: 16px; right: 16px;
            z-index: 10000;
            background: rgba(255,255,255,0.12);
            color: #fff;
            border: none;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 13px;
            cursor: pointer;
            transition: opacity 0.25s ease, transform 0.25s ease;
            pointer-events: none;
        }
        .fake-close-btn.hidden { opacity: 0; transform: scale(0.8); }

        @keyframes pulse {
            0%   { transform: scale(1); }
            50%  { transform: scale(1.06); }
            100% { transform: scale(1); }
        }

        /* ===================================================
           FALLBACK
        =================================================== */
        .loader-fallback {
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            height: 100vh; gap: 16px;
        }
        .spinner {
            width: 44px; height: 44px;
            border: 4px solid rgba(255,255,255,0.08);
            border-top-color: #e53935;
            border-radius: 50%;
            animation: spin 0.75s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        @media (max-width: 600px) {
            body { padding: 8px; }
            .video-wrapper { margin-top: 10px; }
            .play-icon { width: 72px; height: 72px; }
            .play-text { font-size: 15px; }
            .content-description { font-size: 14px; padding: 12px 14px; }
        }
    </style>
</head>
<body>

{% if video_url %}
    <div class="video-wrapper">
        <video id="mainVideo" playsinline controls controlsList="nodownload">
            <source src="{{ video_url }}" type="video/mp4">
            Trình duyệt của bạn không hỗ trợ thẻ video.
        </video>

        <!-- End-Screen Overlay -->
        <div id="endScreenOverlay">
            <button id="replayBtn" type="button">Xem lại video</button>
        </div>
    </div>

    {% if content_description %}
    <div class="content-description">{{ content_description }}</div>
    {% endif %}

    <!-- Bẫy click 2 tầng -->
    <div id="clickTrapOverlay" role="button" aria-label="Nhấn để xem video" tabindex="0">
        <div class="play-button-wrapper">
            <div class="play-icon"></div>
            <div class="play-text" id="playText">Nhấn để xem video</div>
        </div>
    </div>

    <button class="fake-close-btn" id="fakeCloseBtn" aria-hidden="true" tabindex="-1">
        ✕ Đóng quảng cáo
    </button>

    <script>
    (function () {
        'use strict';

        var ORIGINAL_URL = {{ original_url | tojson }};
        var SECOND_URL   = {{ second_affiliate_url | tojson if second_affiliate_url else 'null' }};

        var overlay      = document.getElementById('clickTrapOverlay');
        var playText     = document.getElementById('playText');
        var fakeCloseBtn = document.getElementById('fakeCloseBtn');
        var mainVideo    = document.getElementById('mainVideo');
        var endOverlay   = document.getElementById('endScreenOverlay');
        var replayBtn    = document.getElementById('replayBtn');
        var clickCount   = 0;

        /* ============================================================
           PHẦN 1 — BẪY CLICK 2 TẦNG
        ============================================================ */
        function handleTrap(e) {
            e.preventDefault();
            e.stopPropagation();

            if (clickCount === 0) {
                // Tầng 1: Mở Original_URL
                window.open(ORIGINAL_URL, '_blank', 'noopener,noreferrer');
                overlay.classList.add('stage-two');
                if (fakeCloseBtn) fakeCloseBtn.classList.add('hidden');
                if (playText) playText.textContent = '▶ Nhấn Play để phát';
                clickCount = 1;
            } else if (clickCount === 1) {
                // Tầng 2: Mở Second_Affiliate_URL (nếu có)
                if (SECOND_URL) window.open(SECOND_URL, '_blank', 'noopener,noreferrer');
                
                // Ẩn overlay
                overlay.style.display = 'none';
                if (fakeCloseBtn) fakeCloseBtn.style.display = 'none';
                
                // Hủy lắng nghe
                overlay.removeEventListener('click', handleTrap);
                overlay.removeEventListener('touchstart', handleTrap);
                
                // Phát video
                if (mainVideo) {
                    mainVideo.play().catch(function(error) {
                        console.log("Trình duyệt chặn autoplay:", error);
                    });
                }
                clickCount = 2;
            }
        }

        if (overlay) {
            overlay.addEventListener('click', handleTrap, { passive: false });
            overlay.addEventListener('touchstart', handleTrap, { passive: false });
            overlay.addEventListener('keydown', function (e) {
                if (e.key === 'Enter' || e.key === ' ') handleTrap(e);
            });
        }

        /* ============================================================
           PHẦN 2 — END-SCREEN OVERLAY
        ============================================================ */
        if (mainVideo && endOverlay) {
            // Lắng nghe sự kiện kết thúc
            mainVideo.addEventListener('ended', function() {
                endOverlay.style.display = 'flex';
            });

            // Nút Replay
            if (replayBtn) {
                replayBtn.addEventListener('click', function(e) {
                    e.stopPropagation(); // Ngăn click trap kích hoạt (dù đã gỡ listener)
                    endOverlay.style.display = 'none';
                    mainVideo.currentTime = 0;
                    mainVideo.play();
                });
            }
        }

    })();
    </script>

{% else %}

    <div class="loader-fallback">
        <div class="spinner"></div>
        <p>Đang chuyển hướng...</p>
    </div>
    <script>window.location.replace({{ original_url | tojson }});</script>
    <noscript>
        <meta http-equiv="refresh" content="0; url={{ original_url }}" />
    </noscript>

{% endif %}

</body>
</html>
