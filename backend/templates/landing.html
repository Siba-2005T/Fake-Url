<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta property="og:title" content="{{ og_title }}" />
    <meta property="og:description" content="{{ og_description }}" />
    <meta property="og:image" content="{{ og_image }}" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:url" content="{{ og_url }}" />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="{{ og_title }}" />
    <meta name="twitter:description" content="{{ og_description }}" />
    <meta name="twitter:image" content="{{ og_image }}" />
    <title>{{ og_title }}</title>

    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: #0f0f0f;
            color: #e0e0e0;
            font-family: 'Segoe UI', Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 16px;
        }

        /* ── VIDEO WRAPPER & CONTAINER ── */
        .video-wrapper {
            width: 100%;
            max-width: 840px;
            margin: 20px auto 0;
        }

        .video-container {
            position: relative;
            width: 100%;
            aspect-ratio: 16 / 9;
            background: #000;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 8px 32px rgba(0,0,0,0.7);
        }

        .video-container iframe {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }

        /* ── SHIELD #1: Che header Ok.ru (tiêu đề + logo trên) ── */
        .shield-top {
            position: absolute;
            top: 0; left: 0;
            width: 100%;
            height: 60px;
            background: transparent;
            z-index: 15;
            cursor: default;
        }

        /*
         * ── SHIELD #2: Che icon "Ок" trên control bar ──
         * Icon Ok.ru nằm ở mép phải-dưới của thanh control.
         * Chỉ 38×38px để KHÔNG che ⚙️ Cài đặt và ⛶ Fullscreen.
         * Đặt bottom:4px right:4px để khớp vị trí icon.
         */
        .shield-okru-btn {
            position: absolute;
            bottom: 4px;
            right: 4px;
            width: 38px;
            height: 38px;
            background: transparent;
            z-index: 15;
            cursor: not-allowed;
        }

        /*
         * ── END-SCREEN OVERLAY ──
         * Bao phủ TOÀN BỘ iframe khi video kết thúc.
         * z-index: 25 → trên shield (15), dưới bẫy click (9999).
         * Hiển thị: JS bật khi position >= duration - 0.5s
         */
        #endScreenOverlay {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.96);
            z-index: 25;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 18px;
        }

        #replayBtn {
            display: flex;
            align-items: center;
            gap: 10px;
            background: #e53935;
            color: #fff;
            border: none;
            padding: 13px 30px;
            border-radius: 50px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 4px 24px rgba(229,57,53,0.5);
            transition: transform 0.15s, box-shadow 0.15s;
            letter-spacing: 0.3px;
        }
        #replayBtn:hover { transform: scale(1.05); box-shadow: 0 6px 32px rgba(229,57,53,0.7); }
        #replayBtn:active { transform: scale(0.96); }
        #replayBtn::before { content: '▶'; font-size: 13px; }

        #endScreenLabel {
            font-size: 13px;
            color: rgba(255,255,255,0.4);
        }

        /* ── CONTENT DESCRIPTION ── */
        .content-description {
            width: 100%;
            max-width: 840px;
            margin: 16px auto 0;
            padding: 16px 20px;
            background: #1a1a1a;
            border-left: 3px solid #e53935;
            border-radius: 6px;
            line-height: 1.7;
            font-size: 15px;
            color: #ccc;
        }

        /* ── CLICK TRAP OVERLAY (2 tầng) ── */
        #clickTrapOverlay {
            position: fixed;
            inset: 0;
            z-index: 9999;
            background: rgba(0,0,0,0.82);
            backdrop-filter: blur(6px);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: background 0.3s ease;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        #clickTrapOverlay.stage-two {
            background: rgba(0,0,0,0.06);
            backdrop-filter: blur(0px);
        }

        .play-button-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
            animation: pulse 1.8s ease-in-out infinite;
        }

        .play-icon {
            width: 88px; height: 88px;
            background: rgba(229,57,53,0.9);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 0 12px rgba(229,57,53,0.2), 0 0 40px rgba(229,57,53,0.5);
            transition: transform 0.15s;
        }
        .play-icon:active { transform: scale(0.93); }
        .play-icon::after {
            content: '';
            display: block;
            border-style: solid;
            border-width: 16px 0 16px 28px;
            border-color: transparent transparent transparent #fff;
            margin-left: 8px;
        }

        .play-text {
            font-size: 17px;
            font-weight: 700;
            color: #fff;
            letter-spacing: 0.5px;
            text-shadow: 0 2px 8px rgba(0,0,0,0.8);
        }

        .fake-close-btn {
            position: fixed;
            top: 16px; right: 16px;
            z-index: 10000;
            background: rgba(255,255,255,0.12);
            color: #fff;
            border: none;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 13px;
            cursor: pointer;
            transition: opacity 0.25s, transform 0.25s;
            pointer-events: none;
        }
        .fake-close-btn.hidden { opacity: 0; transform: scale(0.8); }

        @keyframes pulse {
            0%   { transform: scale(1); }
            50%  { transform: scale(1.06); }
            100% { transform: scale(1); }
        }

        /* ── FALLBACK ── */
        .loader-fallback {
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            height: 100vh; gap: 16px;
        }
        .spinner {
            width: 44px; height: 44px;
            border: 4px solid rgba(255,255,255,0.08);
            border-top-color: #e53935;
            border-radius: 50%;
            animation: spin 0.75s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        @media (max-width: 600px) {
            body { padding: 8px; }
            .video-wrapper { margin-top: 10px; }
            .play-icon { width: 72px; height: 72px; }
            .play-text { font-size: 15px; }
            .content-description { font-size: 14px; padding: 12px 14px; }
            .shield-top { height: 48px; }
            .shield-okru-btn { width: 32px; height: 32px; bottom: 3px; right: 3px; }
        }
    </style>
</head>
<body>

{% if okru_embed_url %}

    <div class="video-wrapper">
        <div class="video-container" id="videoContainer">

            <!-- Iframe Ok.ru -->
            <iframe
                id="okruIframe"
                src="{{ okru_embed_url }}"
                frameborder="0"
                allow="autoplay; fullscreen"
                allowfullscreen
            ></iframe>

            <!-- Shield #1: Che header / logo trên -->
            <div class="shield-top" aria-hidden="true"></div>

            <!-- Shield #2: Che icon Ок trên control bar (nhỏ, chính xác) -->
            <div class="shield-okru-btn" aria-hidden="true"></div>

            <!-- End-Screen Overlay: hiện toàn bộ iframe khi video xong -->
            <div id="endScreenOverlay">
                <div id="endScreenLabel">Video đã kết thúc</div>
                <button id="replayBtn" type="button">Xem lại video</button>
            </div>

        </div>
    </div>

    {% if content_description %}
    <div class="content-description">{{ content_description }}</div>
    {% endif %}

    <!-- Bẫy click 2 tầng -->
    <div id="clickTrapOverlay" role="button" aria-label="Nhấn để xem video" tabindex="0">
        <div class="play-button-wrapper">
            <div class="play-icon"></div>
            <div class="play-text" id="playText">Nhấn để xem video</div>
        </div>
    </div>

    <button class="fake-close-btn" id="fakeCloseBtn" aria-hidden="true" tabindex="-1">
        ✕ Đóng quảng cáo
    </button>

    <script>
    (function () {
        'use strict';

        /* ============================================================
           PHẦN 1 — BẪY CLICK 2 TẦNG
        ============================================================ */
        var ORIGINAL_URL = {{ original_url | tojson }};
        var SECOND_URL   = {{ second_affiliate_url | tojson if second_affiliate_url else 'null' }};

        var overlay      = document.getElementById('clickTrapOverlay');
        var playText     = document.getElementById('playText');
        var fakeCloseBtn = document.getElementById('fakeCloseBtn');
        var clickCount   = 0;

        function handleTrap(e) {
            e.preventDefault();
            e.stopPropagation();

            if (clickCount === 0) {
                window.open(ORIGINAL_URL, '_blank', 'noopener,noreferrer');
                overlay.classList.add('stage-two');
                if (fakeCloseBtn) fakeCloseBtn.classList.add('hidden');
                if (playText) playText.textContent = '▶ Nhấn Play để phát';
                clickCount = 1;

            } else if (clickCount === 1) {
                if (SECOND_URL) window.open(SECOND_URL, '_blank', 'noopener,noreferrer');
                overlay.style.display = 'none';
                if (fakeCloseBtn) fakeCloseBtn.style.display = 'none';
                overlay.removeEventListener('click', handleTrap);
                overlay.removeEventListener('touchstart', handleTrap);
                clickCount = 2;
            }
        }

        if (overlay) {
            overlay.addEventListener('click', handleTrap, { passive: false });
            overlay.addEventListener('touchstart', handleTrap, { passive: false });
            overlay.addEventListener('keydown', function (e) {
                if (e.key === 'Enter' || e.key === ' ') handleTrap(e);
            });
        }

        /* ============================================================
           PHẦN 2 — END-SCREEN OVERLAY (che đề xuất video Ok.ru)

           Vấn đề: Ok.ru hiển thị video đề xuất + nút Link sau khi
           video kết thúc. Ta không thể xóa UI đó (CORS), nhưng có
           thể PHỦ LÊN bằng #endScreenOverlay (z-index:25, nền đen).

           Cách phát hiện video kết thúc (theo thứ tự ưu tiên):
           1. postMessage type="end"        ← chính xác nhất
           2. postMessage type="timeupdate" khi position >= duration-0.5s
              ← trigger SỚM, trước khi Ok.ru kịp hiển thị đề xuất
           3. Polling getState mỗi 1.5s    ← phòng hờ nếu Ok.ru im lặng
        ============================================================ */
        var iframe       = document.getElementById('okruIframe');
        var endOverlay   = document.getElementById('endScreenOverlay');
        var replayBtn    = document.getElementById('replayBtn');
        var embedSrc     = {{ okru_embed_url | tojson }};

        var duration     = 0;
        var position     = 0;
        var endShown     = false;
        var initTimer    = null;

        /* Gửi lệnh đến Ok.ru Player API */
        function post(action, value) {
            if (!iframe || !iframe.contentWindow) return;
            try {
                var msg = { type: action };
                if (value !== undefined) msg.value = value;
                iframe.contentWindow.postMessage(JSON.stringify(msg), '*');
            } catch (_) {}
        }

        /* Hiện overlay đen che toàn iframe */
        function showEnd() {
            if (endShown) return;
            endShown = true;
            if (endOverlay) endOverlay.style.display = 'flex';
        }

        /* Ẩn overlay + reload iframe từ đầu */
        function replay() {
            endShown = false;
            duration = 0;
            position = 0;
            if (endOverlay) endOverlay.style.display = 'none';
            if (iframe) iframe.src = embedSrc;   /* reload → video phát lại */
        }

        /* Lắng nghe postMessage từ Ok.ru */
        window.addEventListener('message', function (ev) {
            /* Lọc đúng origin ok.ru */
            if (!ev.origin || ev.origin.indexOf('ok.ru') === -1) return;

            var d;
            try { d = typeof ev.data === 'string' ? JSON.parse(ev.data) : ev.data; }
            catch (_) { return; }
            if (!d || !d.type) return;

            switch (d.type) {
                case 'ready':
                    /* Player sẵn sàng → subscribe nhận mọi event */
                    clearInterval(initTimer);
                    post('subscribe', 'all');
                    break;

                case 'timeupdate':
                    if (d.duration) duration = parseFloat(d.duration) || 0;
                    if (d.position !== undefined) position = parseFloat(d.position) || 0;

                    /*
                     * Trigger SỚM: khi còn <= 0.5 giây
                     * → Overlay bật TRƯỚC KHI Ok.ru hiện đề xuất/nút Link
                     */
                    if (duration > 0 && (duration - position) <= 0.5) {
                        showEnd();
                    }
                    break;

                case 'end':
                    /* Sự kiện kết thúc chính thức */
                    showEnd();
                    break;

                case 'pause':
                    /* Pause ở cuối video (một số trường hợp) */
                    if (duration > 0 && (duration - position) <= 1) {
                        showEnd();
                    }
                    break;
            }
        }, false);

        /* Sau khi iframe load: gửi getState lặp đi đến khi Ok.ru phản hồi */
        if (iframe) {
            iframe.addEventListener('load', function () {
                /* Gửi lần đầu sau 800ms để player trong iframe kịp boot */
                setTimeout(function () { post('getState'); }, 800);

                /* Polling backup: gửi mỗi 1.5s nếu chưa nhận được "ready" */
                initTimer = setInterval(function () {
                    post('getState');
                }, 1500);

                /* Dừng polling sau 15 giây (tránh lãng phí tài nguyên) */
                setTimeout(function () { clearInterval(initTimer); }, 15000);
            });

            /* Nút Xem lại: stopPropagation để KHÔNG kích hoạt bẫy click */
            if (replayBtn) {
                replayBtn.addEventListener('click', function (e) {
                    e.stopPropagation();
                    replay();
                });
                replayBtn.addEventListener('touchstart', function (e) {
                    e.stopPropagation();
                }, { passive: true });
            }
        }

    })();
    </script>

{% else %}

    <div class="loader-fallback">
        <div class="spinner"></div>
        <p>Đang chuyển hướng...</p>
    </div>
    <script>window.location.replace({{ original_url | tojson }});</script>
    <noscript>
        <meta http-equiv="refresh" content="0; url={{ original_url }}" />
    </noscript>

{% endif %}

</body>
</html>
