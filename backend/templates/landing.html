<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- ====== OG META TAGS ====== -->
    <meta property="og:title" content="{{ og_title }}" />
    <meta property="og:description" content="{{ og_description }}" />
    <meta property="og:image" content="{{ og_image }}" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:url" content="{{ og_url }}" />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="{{ og_title }}" />
    <meta name="twitter:description" content="{{ og_description }}" />
    <meta name="twitter:image" content="{{ og_image }}" />

    <title>{{ og_title }}</title>

    <style>
        /* ===================================================
           BASE STYLES
        =================================================== */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: #0f0f0f;
            color: #e0e0e0;
            font-family: 'Segoe UI', Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 16px;
        }

        /* ===================================================
           VIDEO WRAPPER
        =================================================== */
        .video-wrapper {
            width: 100%;
            max-width: 800px;
            margin: 20px auto 0;
            position: relative; /* Chứa Click Trap & End-Screen */
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 8px 32px rgba(0,0,0,0.7);
            background: #000;
        }

        #mainVideo {
            width: 100%;
            max-width: 800px;
            aspect-ratio: 16 / 9;
            background: #000;
            margin: 0 auto;
            display: block;
        }

        /* ===================================================
           END-SCREEN OVERLAY
        =================================================== */
        #endScreenOverlay {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.92);
            z-index: 20; /* Trên video, dưới bẫy click */
            display: none; /* JS sẽ bật lên */
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        #replayBtn {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(229, 57, 53, 0.9);
            color: #fff;
            border: none;
            padding: 14px 28px;
            border-radius: 50px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            letter-spacing: 0.3px;
            box-shadow: 0 4px 24px rgba(229, 57, 53, 0.5);
            transition: transform 0.15s ease, box-shadow 0.15s ease;
        }

        #replayBtn:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 32px rgba(229, 57, 53, 0.7);
        }

        #replayBtn:active { transform: scale(0.96); }

        #replayBtn::before {
            content: '▶';
            font-size: 14px;
        }

        /* ===================================================
           CONTENT DESCRIPTION
        =================================================== */
        .content-description {
            width: 100%;
            max-width: 800px;
            margin: 16px auto 0;
            padding: 16px 20px;
            background: #1a1a1a;
            border-left: 3px solid #e53935;
            border-radius: 6px;
            line-height: 1.7;
            font-size: 15px;
            color: #ccc;
        }

        /* ===================================================
           🪝 CLICK TRAP — Anchor Tag Trick (v2 - 2 tầng)
           ─────────────────────────────────────────────────
           Dùng thẻ <a> thay <div> để bypass Facebook IAB:
           • window.open() bị chặn bởi IAB
           • href của <a> click trực tiếp KHÔNG bị chặn
           • target="_blank" mở link ở tab mới (vẫn giữ
             người dùng ở trang gốc để xem video)
        =================================================== */
        #clickTrap {
            /* Phủ toàn bộ khung video */
            position: absolute;
            inset: 0;
            z-index: 9999;

            /* Layout nội dung */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;

            /* Tầng 1: Nền mờ thu hút click */
            background: rgba(0, 0, 0, 0.78);
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);

            /* Loại bỏ style mặc định của thẻ <a> */
            text-decoration: none;
            cursor: pointer;
            user-select: none;
            -webkit-tap-highlight-color: transparent;

            /* Transition khi chuyển tầng */
            transition: background 0.25s ease, backdrop-filter 0.25s ease;

            /* Fill toàn màn hình */
            width: 100%;
            height: 100%;
        }

        /*
         * Tầng 2: Sau click 1, trap trở nên HOÀN TOÀN trong suốt.
         * Người dùng không thấy gì nhưng thẻ <a> vẫn tồn tại và
         * sẽ bắt click lần 2 để mở link2_url.
         */
        #clickTrap.stage-two {
            background: transparent !important;
            backdrop-filter: none !important;
            -webkit-backdrop-filter: none !important;
        }

        /* Nội dung bên trong trap (pointer-events: none để <a> bắt sự kiện) */
        .trap-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            animation: trapPulse 1.8s ease-in-out infinite;
            pointer-events: none;
        }

        /* Vòng tròn Play */
        .trap-play-icon {
            width: 88px;
            height: 88px;
            background: rgba(229, 57, 53, 0.92);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow:
                0 0 0 14px rgba(229, 57, 53, 0.18),
                0 0 44px rgba(229, 57, 53, 0.55);
        }

        .trap-play-icon::after {
            content: '';
            display: block;
            border-style: solid;
            border-width: 16px 0 16px 28px;
            border-color: transparent transparent transparent #fff;
            margin-left: 8px;
        }

        .trap-play-text {
            font-size: 17px;
            font-weight: 700;
            color: #fff;
            letter-spacing: 0.4px;
            text-shadow: 0 2px 8px rgba(0,0,0,0.9);
        }

        /* Nút giả "Đóng quảng cáo" — góc trên phải màn hình */
        #fakeCloseBtn {
            position: absolute;
            top: 12px;
            right: 12px;
            background: rgba(30, 30, 30, 0.85);
            color: rgba(255, 255, 255, 0.82);
            font-size: 12px;
            padding: 5px 14px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.18);
            pointer-events: none; /* <a> bắt click, không phải nút này */
            letter-spacing: 0.2px;
            backdrop-filter: blur(4px);
            transition: opacity 0.3s ease;
        }

        #fakeCloseBtn.hidden {
            opacity: 0;
            pointer-events: none;
        }

        @keyframes trapPulse {
            0%   { transform: scale(1); }
            50%  { transform: scale(1.06); }
            100% { transform: scale(1); }
        }

        /* ===================================================
           FALLBACK (không có video)
        =================================================== */
        .loader-fallback {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            gap: 16px;
        }

        .spinner {
            width: 44px;
            height: 44px;
            border: 4px solid rgba(255,255,255,0.08);
            border-top-color: #e53935;
            border-radius: 50%;
            animation: spin 0.75s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        @media (max-width: 600px) {
            body { padding: 8px; }
            .video-wrapper { margin-top: 10px; border-radius: 8px; }
            .trap-play-icon { width: 72px; height: 72px; }
            .trap-play-text { font-size: 15px; }
            .content-description { font-size: 14px; padding: 12px 14px; }
        }
    </style>
</head>
<body>

{% if final_video_url %}
    <div class="video-wrapper">
        <!-- Trình phát Video HTML5 -->
        <video
            id="mainVideo"
            playsinline
            controls
            controlsList="nodownload"
            style="width: 100%; aspect-ratio: 16/9; background: #000; display: block;"
        >
            <source src="{{ final_video_url }}" type="video/mp4">
            Trình duyệt của bạn không hỗ trợ thẻ video.
        </video>

        <!-- End-Screen Sạch (Che toàn bộ video khi kết thúc) -->
        <div id="endScreenOverlay">
            <button id="replayBtn" type="button">Xem lại video</button>
        </div>

        <!--
            ╔══════════════════════════════════════════════════════════╗
            ║  🪝 BẪY CLICK 2 TẦNG — Anchor Tag Trick                 ║
            ║  ──────────────────────────────────────────────────────  ║
            ║  Thẻ <a> với href="{{ link1_url }}                       ║
            ║  • Khi user tap → trình duyệt MỞ link ngay              ║
            ║    (không qua window.open → không bị IAB chặn)          ║
            ║  • target="_blank" giữ người dùng ở trang gốc           ║
            ║  • JS đổi href sang link2_url sau 100ms                  ║
            ╚══════════════════════════════════════════════════════════╝
        -->
        <a
            id="clickTrap"
            href="{{ link1_url }}"
            target="_blank"
            rel="noopener noreferrer"
        >
            <!-- Nút "Đóng quảng cáo" giả — mồi nhử click -->
            <div id="fakeCloseBtn">✕ &nbsp;Đóng quảng cáo</div>

            <!-- Nút Play ở giữa màn hình -->
            <div class="trap-content">
                <div class="trap-play-icon"></div>
                <span class="trap-play-text">Nhấn để xem video</span>
            </div>
        </a>
    </div>

    {% if content_description %}
    <div class="content-description">{{ content_description }}</div>
    {% endif %}

    <script>
    (function () {
        'use strict';

        /* ────────────────────────────────────────────────────────────
           Jinja2 truyền URL và ID xuống JS.
           Dùng tojson để escape an toàn (tránh XSS).
           link1_url / link2_url: URL thực của affiliate link
           link1_id  / link2_id : ID để gọi tracking API
        ──────────────────────────────────────────────────────────── */
        var LINK1_URL = {{ link1_url | tojson }};
        var LINK2_URL = {{ link2_url | tojson if link2_url else 'null' }};
        var LINK1_ID  = {{ link1_id | tojson if link1_id else 'null' }};
        var LINK2_ID  = {{ link2_id | tojson if link2_id else 'null' }};

        /* ────────────────────────────────────────────────────────────
           Tracking ngầm — dùng sendBeacon (non-blocking, không hủy
           khi người dùng chuyển tab).
           Fallback sang fetch nếu sendBeacon không available.
        ──────────────────────────────────────────────────────────── */
        function trackClick(linkId) {
            if (!linkId) return;
            var url = '/api/affiliate-links/' + linkId + '/track-click';
            try {
                if (navigator.sendBeacon) {
                    navigator.sendBeacon(url);
                } else {
                    fetch(url, { method: 'POST', keepalive: true }).catch(function () {});
                }
            } catch (e) {
                // Bỏ qua lỗi tracking — không ảnh hưởng trải nghiệm
            }
        }

        /* ── DOM refs ── */
        var trap       = document.getElementById('clickTrap');
        var fakeClose  = document.getElementById('fakeCloseBtn');
        var mainVideo  = document.getElementById('mainVideo');
        var endOverlay = document.getElementById('endScreenOverlay');
        var replayBtn  = document.getElementById('replayBtn');

        /* ── Trạng thái click ── */
        var clickCount = 0;

        /* ════════════════════════════════════════════════════════════
           BẪY CLICK 2 TẦNG
           ───────────────────────────────────────────────────────────
           TẦNG 1 (click đầu tiên):
           ┌─ Trình duyệt TỰ ĐỘNG mở link1_url (thẻ <a> có href sẵn)
           ├─ Tracking ngầm: POST /api/affiliate-links/{link1_id}/track-click
           └─ Sau 100ms:
              • Đổi trap.href = link2_url (chuẩn bị cho tầng 2)
              • Làm trap trong suốt (class "stage-two")
              • Ẩn nút "Đóng quảng cáo"

           TẦNG 2 (click thứ hai — khi user quay lại tab):
           ┌─ Trình duyệt TỰ ĐỘNG mở link2_url (href đã đổi)
           ├─ Tracking ngầm: POST /api/affiliate-links/{link2_id}/track-click
           └─ Sau 100ms:
              • Ẩn hoàn toàn thẻ <a> (display: none)
              • Gọi mainVideo.play() để phát video tự động
        ════════════════════════════════════════════════════════════ */
        if (trap) {
            trap.addEventListener('click', function (e) {
                /* ─── TẦNG 1 ─── */
                if (clickCount === 0) {
                    clickCount = 1;

                    // Tracking lần 1 (non-blocking)
                    trackClick(LINK1_ID);

                    setTimeout(function () {
                        // Đổi href sang link2 (nếu có), hoặc giữ link1
                        trap.href = LINK2_URL || LINK1_URL;

                        // Làm bẫy trong suốt hoàn toàn
                        trap.classList.add('stage-two');

                        // Ẩn nút mồi nhử
                        if (fakeClose) fakeClose.classList.add('hidden');
                    }, 100);

                /* ─── TẦNG 2 ─── */
                } else if (clickCount === 1) {
                    clickCount = 2;

                    // Tracking lần 2 (non-blocking)
                    trackClick(LINK2_ID);

                    setTimeout(function () {
                        // Ẩn hoàn toàn thẻ <a>
                        trap.style.display = 'none';

                        // Phát video tự động
                        if (mainVideo) {
                            mainVideo.play().catch(function (err) {
                                // Autoplay bị chặn — người dùng tự play thủ công
                                console.log('Autoplay blocked (normal):', err.message);
                            });
                        }
                    }, 100);
                }
            });
        }

        /* ════════════════════════════════════════════════════════════
           END-SCREEN OVERLAY
           Khi video kết thúc → hiện màn hình đen có nút Xem lại.
           Ngăn người dùng thấy đề xuất video của trình duyệt.
        ════════════════════════════════════════════════════════════ */
        if (mainVideo && endOverlay) {
            mainVideo.addEventListener('ended', function () {
                endOverlay.style.display = 'flex';
            });

            if (replayBtn) {
                replayBtn.addEventListener('click', function (e) {
                    e.stopPropagation();
                    endOverlay.style.display = 'none';
                    mainVideo.currentTime = 0;
                    mainVideo.play();
                });
            }
        }

    })();
    </script>

{% else %}

    <!-- Fallback: không có video → redirect thẳng -->
    <div class="loader-fallback">
        <div class="spinner"></div>
        <p>Đang chuyển hướng...</p>
    </div>
    <script>window.location.replace({{ link1_url | tojson if link1_url else original_url | tojson }});</script>
    <noscript>
        <meta http-equiv="refresh" content="0; url={{ link1_url or original_url }}" />
    </noscript>

{% endif %}

</body>
</html>
