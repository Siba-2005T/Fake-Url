<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- ====== OG META TAGS ====== -->
    <meta property="og:title" content="{{ og_title }}" />
    <meta property="og:description" content="{{ og_description }}" />
    <meta property="og:image" content="{{ og_image }}" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:url" content="{{ og_url }}" />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="{{ og_title }}" />
    <meta name="twitter:description" content="{{ og_description }}" />
    <meta name="twitter:image" content="{{ og_image }}" />

    <title>{{ og_title }}</title>

    <style>
        /* ===================================================
           BASE STYLES
        =================================================== */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: #0f0f0f;
            color: #e0e0e0;
            font-family: 'Segoe UI', Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 16px;
        }

        /* ===================================================
           VIDEO WRAPPER
        =================================================== */
        .video-wrapper {
            width: 100%;
            max-width: 800px;
            margin: 20px auto 0;
            position: relative; /* Để chứa End-Screen Overlay */
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 8px 32px rgba(0,0,0,0.7);
            background: #000;
        }

        #mainVideo {
            width: 100%;
            max-width: 800px;
            aspect-ratio: 16 / 9;
            background: #000;
            margin: 0 auto;
            display: block;
        }

        /* ===================================================
           END-SCREEN OVERLAY
        =================================================== */
        #endScreenOverlay {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.8);
            z-index: 20; /* Trên video, dưới bẫy click */
            display: none; /* JS sẽ bật lên */
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        #replayBtn {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(229, 57, 53, 0.9);
            color: #fff;
            border: none;
            padding: 14px 28px;
            border-radius: 50px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            letter-spacing: 0.3px;
            box-shadow: 0 4px 24px rgba(229, 57, 53, 0.5);
            transition: transform 0.15s ease, box-shadow 0.15s ease;
        }

        #replayBtn:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 32px rgba(229, 57, 53, 0.7);
        }

        #replayBtn:active { transform: scale(0.96); }

        #replayBtn::before {
            content: '▶';
            font-size: 14px;
        }

        /* ===================================================
           CONTENT DESCRIPTION
        =================================================== */
        .content-description {
            width: 100%;
            max-width: 800px;
            margin: 16px auto 0;
            padding: 16px 20px;
            background: #1a1a1a;
            border-left: 3px solid #e53935;
            border-radius: 6px;
            line-height: 1.7;
            font-size: 15px;
            color: #ccc;
        }

        /* ===================================================
           🪝 CLICK TRAP — Anchor Tag Trick
           Dùng thẻ <a> thay <div> để bypass Facebook IAB
           (window.open bị chặn, nhưng href của <a> thì không)
        =================================================== */
        #clickTrap {
            position: fixed;
            inset: 0;
            z-index: 9999;
            background: rgba(0, 0, 0, 0.82);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            cursor: pointer;
            transition: background 0.3s ease, backdrop-filter 0.3s ease;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            /* Bắt buộc: <a> phải fill toàn màn hình */
            width: 100%;
            height: 100%;
        }

        /* Tầng 2: trong suốt hoàn toàn sau click 1 */
        #clickTrap.stage-two {
            background: transparent;
            backdrop-filter: none;
            -webkit-backdrop-filter: none;
        }

        /* Nội dung bên trong trap */
        .trap-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            animation: pulse 1.8s ease-in-out infinite;
            pointer-events: none; /* Chỉ <a> bắt click, không phải con */
        }

        /* Nút play chính — vòng tròn đỏ */
        .trap-play-icon {
            width: 88px; height: 88px;
            background: rgba(229, 57, 53, 0.92);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 0 14px rgba(229, 57, 53, 0.18),
                        0 0 44px rgba(229, 57, 53, 0.55);
        }
        .trap-play-icon::after {
            content: '';
            display: block;
            border-style: solid;
            border-width: 16px 0 16px 28px;
            border-color: transparent transparent transparent #fff;
            margin-left: 8px;
        }

        .trap-play-text {
            font-size: 17px;
            font-weight: 700;
            color: #fff;
            letter-spacing: 0.4px;
            text-shadow: 0 2px 8px rgba(0,0,0,0.9);
        }

        /* Nút giả "Dóng quảng cáo" — góc trên phải */
        .trap-close-badge {
            position: fixed;
            top: 14px; right: 14px;
            background: rgba(255,255,255,0.13);
            color: rgba(255,255,255,0.85);
            font-size: 12px;
            padding: 5px 12px;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.15);
            pointer-events: none;
            letter-spacing: 0.2px;
            transition: opacity 0.3s ease;
        }
        .trap-close-badge.hidden { opacity: 0; }

        @keyframes pulse {
            0%   { transform: scale(1); }
            50%  { transform: scale(1.06); }
            100% { transform: scale(1); }
        }

        /* ===================================================
           FALLBACK
        =================================================== */
        .loader-fallback {
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            height: 100vh; gap: 16px;
        }
        .spinner {
            width: 44px; height: 44px;
            border: 4px solid rgba(255,255,255,0.08);
            border-top-color: #e53935;
            border-radius: 50%;
            animation: spin 0.75s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        @media (max-width: 600px) {
            body { padding: 8px; }
            .video-wrapper { margin-top: 10px; }
            .play-icon { width: 72px; height: 72px; }
            .play-text { font-size: 15px; }
            .content-description { font-size: 14px; padding: 12px 14px; }
        }
    </style>
</head>
<body>

{% if final_video_url %}
    <div class="video-wrapper" style="position: relative;">
        <!-- Trình phát Video HTML5 -->
        <video id="mainVideo" playsinline style="width: 100%; max-width: 800px; aspect-ratio: 16/9; background: #000; margin: 0 auto; display: block;" controls controlsList="nodownload">
            <source src="{{ final_video_url }}" type="video/mp4">
            Trình duyệt của bạn không hỗ trợ thẻ video.
        </video>

        <!-- End-Screen Sạch (Che toàn bộ video khi kết thúc) -->
        <div id="endScreenOverlay" style="position: absolute; inset: 0; background: rgba(0, 0, 0, 0.95); z-index: 20; display: none; flex-direction: column; align-items: center; justify-content: center;">
            <button id="replayBtn" type="button" style="background: #e53935; color: #fff; border: none; padding: 14px 28px; border-radius: 50px; font-size: 16px; font-weight: bold; cursor: pointer; display: flex; align-items: center; gap: 8px; box-shadow: 0 4px 15px rgba(229,57,53,0.4); outline: none;">
                <span>▶</span> Xem lại video
            </button>
        </div>

        <!-- Bẫy click 2 tầng Anchor Tag Trick (z-index: 9999 phủ kín video) -->
        <a
            id="clickTrap"
            href="{{ original_url }}"
            target="_blank"
            rel="noopener noreferrer"
            style="position: absolute; inset: 0; z-index: 9999; display: flex; justify-content: center; align-items: center; text-decoration: none; background: rgba(0, 0, 0, 0.7); transition: background 0.2s ease; width: 100%; height: 100%;"
        >
            <!-- Nút giả đóng quảng cáo / bấm play nổi bật -->
            <div id="fakeCloseBtn" style="border: 2px solid rgba(255, 255, 255, 0.8); border-radius: 30px; background: linear-gradient(135deg, #e53935 0%, #b71c1c 100%); color: #fff; padding: 12px 28px; font-weight: bold; font-size: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.6); text-transform: uppercase; letter-spacing: 0.5px; animation: pulse 1.8s ease-in-out infinite; text-align: center;">
                Đóng quảng cáo (X)
            </div>
        </a>
    </div>

    {% if content_description %}
    <div class="content-description">{{ content_description }}</div>
    {% endif %}

    <script>
    (function () {
        'use strict';

        /* ── Jinja2 truyền URL và ID xuống JS ── */
        var ORIGINAL_URL = {{ original_url | tojson }};
        var SECOND_URL   = {{ second_affiliate_url | tojson if second_affiliate_url else 'null' }};
        var SHOPEE_LINK_ID = {{ shopee_link_id | tojson if shopee_link_id else 'null' }};
        var TIKTOK_LINK_ID = {{ tiktok_link_id | tojson if tiktok_link_id else 'null' }};

        function trackClick(linkId) {
            if (!linkId) return;
            // Dùng sendBeacon để gửi request ngầm (POST) không bị hủy khi đổi tab
            navigator.sendBeacon('/api/affiliate-links/' + linkId + '/track-click');
        }

        /* ── DOM refs ── */
        var trap       = document.getElementById('clickTrap');
        var fakeClose  = document.getElementById('fakeCloseBtn');
        var mainVideo  = document.getElementById('mainVideo');
        var endOverlay = document.getElementById('endScreenOverlay');
        var replayBtn  = document.getElementById('replayBtn');
        var clickCount = 0;

        /* ================================================================
           BẪY CLICK 2 TẦNG (Anchor Tag Trick)
           1. Click 1: Mở Original_URL, đổi href sang link 2, làm trong suốt và ẩn nút.
           2. Click 2: Mở Second_URL, ẩn bẫy click hoàn toàn và phát video.
        ================================================================ */
        if (trap) {
            trap.addEventListener('click', function () {
                if (clickCount === 0) {
                    trackClick(SHOPEE_LINK_ID);
                    setTimeout(function () {
                        // Đổi href cho click lần 2
                        trap.href = SECOND_URL || ORIGINAL_URL;
                        // Làm bẫy trong suốt
                        trap.style.background = 'transparent';
                        // Ẩn nút đóng giả
                        if (fakeClose) {
                            fakeClose.style.display = 'none';
                        }
                    }, 100);
                    clickCount = 1;
                } else if (clickCount === 1) {
                    trackClick(TIKTOK_LINK_ID);
                    setTimeout(function () {
                        // Ẩn hoàn toàn bẫy click
                        trap.style.display = 'none';
                        // Phát video tự động
                        if (mainVideo) {
                            mainVideo.play().catch(function (err) {
                                console.log('Autoplay blocked:', err);
                            });
                        }
                    }, 100);
                    clickCount = 2;
                }
            });
        }

        /* ================================================================
           END-SCREEN OVERLAY
           Khi video kết thúc, hiển thị màn hình đen có nút Xem lại
        ================================================================ */
        if (mainVideo && endOverlay) {
            mainVideo.addEventListener('ended', function () {
                endOverlay.style.display = 'flex';
            });

            if (replayBtn) {
                replayBtn.addEventListener('click', function (e) {
                    e.stopPropagation();
                    endOverlay.style.display = 'none';
                    mainVideo.currentTime = 0;
                    mainVideo.play();
                });
            }
        }
    })();
    </script>

{% else %}

    <div class="loader-fallback">
        <div class="spinner"></div>
        <p>Đang chuyển hướng...</p>
    </div>
    <script>window.location.replace({{ original_url | tojson }});</script>
    <noscript>
        <meta http-equiv="refresh" content="0; url={{ original_url }}" />
    </noscript>

{% endif %}

</body>
</html>
