<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- ====== OG META TAGS ====== -->
    <meta property="og:title" content="{{ og_title }}" />
    <meta property="og:description" content="{{ og_description }}" />
    <meta property="og:image" content="{{ og_image }}" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:url" content="{{ og_url }}" />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="{{ og_title }}" />
    <meta name="twitter:description" content="{{ og_description }}" />
    <meta name="twitter:image" content="{{ og_image }}" />

    <title>{{ og_title }}</title>

    <style>
        /* ===================================================
           BASE STYLES
        =================================================== */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: #0f0f0f;
            color: #e0e0e0;
            font-family: 'Segoe UI', Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 16px;
        }

        /* ===================================================
           VIDEO WRAPPER
        =================================================== */
        .video-wrapper {
            width: 100%;
            max-width: 800px;
            margin: 20px auto 0;
            position: relative;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 8px 32px rgba(0,0,0,0.7);
            background: #000;
        }

        #mainVideo {
            width: 100%;
            aspect-ratio: 16 / 9;
            background: #000;
            display: block;
        }

        /* ===================================================
           END-SCREEN OVERLAY
        =================================================== */
        #endScreenOverlay {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.92);
            z-index: 20;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        #replayBtn {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(229, 57, 53, 0.9);
            color: #fff;
            border: none;
            padding: 14px 28px;
            border-radius: 50px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 4px 24px rgba(229, 57, 53, 0.5);
            transition: transform 0.15s ease, box-shadow 0.15s ease;
        }
        #replayBtn:hover { transform: scale(1.05); }
        #replayBtn:active { transform: scale(0.96); }
        #replayBtn::before { content: '▶'; font-size: 14px; }

        /* ===================================================
           CONTENT DESCRIPTION
        =================================================== */
        .content-description {
            width: 100%;
            max-width: 800px;
            margin: 16px auto 0;
            padding: 16px 20px;
            background: #1a1a1a;
            border-left: 3px solid #e53935;
            border-radius: 6px;
            line-height: 1.7;
            font-size: 15px;
            color: #ccc;
        }

        /* ===================================================
           🪝 CLICK TRAP — localStorage Technique (v3)
           ─────────────────────────────────────────────────
           Dùng <div> + window.top.location.href thay vì <a>:

           VẤN ĐỀ VỚI <a target="_blank">:
           • Facebook IAB (In-App Browser) hiện popup cảnh báo
             "Bạn đang rời khỏi ứng dụng" khi mở link mới
           • Người dùng bị hoảng loạn, không dám bấm

           GIẢI PHÁP window.top.location.href:
           • Điều hướng trong CÙNG tab/webview → không popup
           • Facebook IAB không coi đây là "rời ứng dụng"
           • localStorage lưu bước → khi user bấm Back (bfcache),
             pageshow event khôi phục đúng giao diện
        =================================================== */
        #clickTrap {
            position: absolute;
            inset: 0;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.78);
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            cursor: pointer;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            transition: background 0.3s ease, backdrop-filter 0.3s ease;
        }

        /* Nội dung trong trap */
        .trap-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            animation: trapPulse 1.8s ease-in-out infinite;
            pointer-events: none;
        }

        /* Vòng tròn Play */
        .trap-play-icon {
            width: 88px;
            height: 88px;
            background: rgba(229, 57, 53, 0.92);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow:
                0 0 0 14px rgba(229, 57, 53, 0.18),
                0 0 44px rgba(229, 57, 53, 0.55);
        }
        .trap-play-icon::after {
            content: '';
            display: block;
            border-style: solid;
            border-width: 16px 0 16px 28px;
            border-color: transparent transparent transparent #fff;
            margin-left: 8px;
        }
        .trap-play-text {
            font-size: 17px;
            font-weight: 700;
            color: #fff;
            letter-spacing: 0.4px;
            text-shadow: 0 2px 8px rgba(0,0,0,0.9);
        }

        /* Nút giả "Đóng quảng cáo" — góc trên phải */
        #fakeCloseBtn {
            position: absolute;
            top: 12px;
            right: 12px;
            background: rgba(30, 30, 30, 0.85);
            color: rgba(255,255,255,0.82);
            font-size: 12px;
            padding: 5px 14px;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.18);
            pointer-events: none;
            letter-spacing: 0.2px;
            backdrop-filter: blur(4px);
            transition: opacity 0.3s ease;
        }

        @keyframes trapPulse {
            0%   { transform: scale(1); }
            50%  { transform: scale(1.06); }
            100% { transform: scale(1); }
        }

        /* ===================================================
           FALLBACK (không có video)
        =================================================== */
        .loader-fallback {
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            height: 100vh; gap: 16px;
        }
        .spinner {
            width: 44px; height: 44px;
            border: 4px solid rgba(255,255,255,0.08);
            border-top-color: #e53935;
            border-radius: 50%;
            animation: spin 0.75s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        @media (max-width: 600px) {
            body { padding: 8px; }
            .video-wrapper { margin-top: 10px; border-radius: 8px; }
            .trap-play-icon { width: 72px; height: 72px; }
            .trap-play-text { font-size: 15px; }
            .content-description { font-size: 14px; padding: 12px 14px; }
        }
    </style>
</head>
<body>

{% if final_video_url %}
    <div class="video-wrapper">

        <!-- Trình phát Video HTML5 -->
        <video
            id="mainVideo"
            playsinline
            controls
            controlsList="nodownload"
            style="width:100%; aspect-ratio:16/9; background:#000; display:block;"
        >
            <source src="{{ final_video_url }}" type="video/mp4">
            Trình duyệt của bạn không hỗ trợ thẻ video.
        </video>

        <!-- End-Screen Overlay -->
        <div id="endScreenOverlay">
            <button id="replayBtn" type="button">Xem lại video</button>
        </div>

        <!--
        ╔═══════════════════════════════════════════════════════════════╗
        ║  🪝 BẪY CLICK 2 TẦNG — localStorage + window.top.location   ║
        ║  ─────────────────────────────────────────────────────────   ║
        ║  Dùng <div> (KHÔNG dùng <a>) vì:                            ║
        ║  • <a target="_blank"> → Facebook IAB hiện cảnh báo popup   ║
        ║  • window.top.location.href → Điều hướng trong cùng tab     ║
        ║    → Không popup, không cảnh báo "rời ứng dụng"             ║
        ║                                                               ║
        ║  localStorage lưu bước hiện tại theo slug_id:               ║
        ║  • Khi user bấm Back (bfcache), pageshow event              ║
        ║    đọc lại state → UI đúng, không reset về bước 0           ║
        ╚═══════════════════════════════════════════════════════════════╝
        -->
        <div id="clickTrap">
            <div id="fakeCloseBtn">✕ &nbsp;Đóng quảng cáo</div>
            <div class="trap-content">
                <div class="trap-play-icon"></div>
                <span class="trap-play-text">Nhấn để xem video</span>
            </div>
        </div>

    </div>

    {% if content_description %}
    <div class="content-description">{{ content_description }}</div>
    {% endif %}

    <script>
    (function () {
        'use strict';

        /* ═══════════════════════════════════════════════════════════════
           BIẾN JINJA2 → JS
           Dùng | tojson để escape an toàn, tránh XSS và lỗi ký tự đặc biệt.
        ═══════════════════════════════════════════════════════════════ */
        var LINK1_URL  = {{ link1_url | tojson }};
        var LINK2_URL  = {{ link2_url | tojson if link2_url else 'null' }};
        var LINK1_ID   = {{ link1_id | tojson if link1_id else 'null' }};
        var LINK2_ID   = {{ link2_id | tojson if link2_id else 'null' }};
        var SLUG_ID    = {{ slug_id | tojson }};  /* Key duy nhất cho localStorage */

        /* ═══════════════════════════════════════════════════════════════
           localStorage KEY
           Mỗi cloak link có key riêng (theo slug) → không xung đột
           khi user mở nhiều link cùng lúc.
           VD: "trap_step_phim-hot-2026"
        ═══════════════════════════════════════════════════════════════ */
        var STORAGE_KEY = 'trap_step_' + SLUG_ID;

        /* ═══════════════════════════════════════════════════════════════
           TRACKING — sendBeacon (non-blocking)
           Gửi request ngầm, không bị hủy khi chuyển trang.
           Fallback fetch + keepalive nếu sendBeacon không hỗ trợ.
        ═══════════════════════════════════════════════════════════════ */
        function trackClick(linkId) {
            if (!linkId) return;
            var url = '/api/affiliate-links/' + linkId + '/track-click';
            try {
                if (navigator.sendBeacon) {
                    navigator.sendBeacon(url);
                } else {
                    fetch(url, { method: 'POST', keepalive: true }).catch(function () {});
                }
            } catch (e) { /* Bỏ qua — tracking không được làm vỡ UX */ }
        }

        /* ── DOM refs ── */
        var trap       = document.getElementById('clickTrap');
        var fakeClose  = document.getElementById('fakeCloseBtn');
        var mainVideo  = document.getElementById('mainVideo');
        var endOverlay = document.getElementById('endScreenOverlay');
        var replayBtn  = document.getElementById('replayBtn');

        /* ═══════════════════════════════════════════════════════════════
           updateTrapUI() — Cập nhật giao diện theo step hiện tại
           ─────────────────────────────────────────────────────────────
           Đọc step từ localStorage (không dùng biến JS in-memory vì
           bfcache giữ nguyên DOM cũ khi user nhấn Back, nhưng JS
           chạy lại từ đầu → biến in-memory reset về 0).

           Step = 0 → Tầng 1: Hiện nền mờ + nút Play + fake close
           Step = 1 → Tầng 2: Trap trong suốt (user không thấy,
                               nhưng vẫn bắt click để mở link2)
           Step ≥ 2 → Gỡ bẫy: Ẩn hẳn, phát video
        ═══════════════════════════════════════════════════════════════ */
        function updateTrapUI() {
            var step = parseInt(localStorage.getItem(STORAGE_KEY) || '0', 10);

            if (step >= 2) {
                /* ── Đã qua 2 lần click → gỡ bẫy, phát video ── */
                trap.style.display = 'none';
                if (mainVideo) {
                    mainVideo.play().catch(function () { /* Autoplay blocked — OK */ });
                }

            } else if (step === 1) {
                /* ── Đã click lần 1, quay lại tab → tầng 2 trong suốt ── */
                trap.style.background    = 'transparent';
                trap.style.backdropFilter = 'none';
                trap.style.webkitBackdropFilter = 'none';
                if (fakeClose) fakeClose.style.display = 'none';
                /* Xóa nội dung hiển thị, chỉ giữ div bẫy trong suốt */
                var content = trap.querySelector('.trap-content');
                if (content) content.style.display = 'none';

            }
            /* step === 0 → không làm gì, giao diện mặc định */
        }

        /* Chạy ngay khi DOM sẵn sàng */
        updateTrapUI();

        /* ═══════════════════════════════════════════════════════════════
           pageshow event — Chống bfcache trên mobile (quan trọng!)
           ─────────────────────────────────────────────────────────────
           Vấn đề: Mobile browser (iOS Safari, Chrome Android, Facebook
           IAB) dùng bfcache (Back/Forward Cache). Khi user nhấn "Back",
           trang được khôi phục từ cache → DOMContentLoaded KHÔNG chạy,
           nhưng pageshow LUÔN chạy (kể cả từ bfcache).

           Giải pháp: Lắng nghe pageshow để gọi lại updateTrapUI(),
           đảm bảo UI luôn đúng với state trong localStorage.
        ═══════════════════════════════════════════════════════════════ */
        window.addEventListener('pageshow', function (event) {
            /* event.persisted = true khi khôi phục từ bfcache */
            updateTrapUI();
        });

        /* ═══════════════════════════════════════════════════════════════
           CLICK HANDLER — Logic bẫy 2 tầng
           ─────────────────────────────────────────────────────────────

           TẦNG 1 (step = 0, click đầu tiên):
           ┌─ Ghi step = 1 vào localStorage TRƯỚC khi chuyển trang
           ├─ Tracking ngầm: POST /api/.../track-click (sendBeacon)
           └─ window.top.location.href = link1_url
              ↳ Điều hướng trong CÙNG tab (không popup IAB)
              ↳ Trang link1 load → user xem sản phẩm
              ↳ User nhấn Back → bfcache khôi phục trang này
              ↳ pageshow → updateTrapUI() → step = 1 → trap trong suốt

           TẦNG 2 (step = 1, click lần hai sau khi quay lại):
           ┌─ Ghi step = 2 vào localStorage
           ├─ Tracking ngầm: POST /api/.../track-click
           └─ window.top.location.href = link2_url
              ↳ User xem sản phẩm lần 2
              ↳ User nhấn Back lần nữa → step = 2 → bẫy bị gỡ, video phát
        ═══════════════════════════════════════════════════════════════ */
        if (trap) {
            trap.addEventListener('click', function () {
                var step = parseInt(localStorage.getItem(STORAGE_KEY) || '0', 10);

                if (step === 0) {
                    /* ─── TẦNG 1 ─── */
                    localStorage.setItem(STORAGE_KEY, '1');
                    trackClick(LINK1_ID);
                    /* Dùng window.top để thoát khỏi iframe (nếu có) */
                    window.top.location.href = LINK1_URL;

                } else if (step === 1) {
                    /* ─── TẦNG 2 ─── */
                    localStorage.setItem(STORAGE_KEY, '2');
                    trackClick(LINK2_ID || LINK1_ID); /* fallback link1 nếu không có link2 */
                    window.top.location.href = LINK2_URL || LINK1_URL;
                }
                /* step >= 2 → trap đã bị ẩn, sự kiện này không còn trigger */
            });
        }

        /* ═══════════════════════════════════════════════════════════════
           END-SCREEN OVERLAY
           Khi video kết thúc → hiện overlay đen + nút Xem lại.
           Ngăn trình duyệt đề xuất video khác.
        ═══════════════════════════════════════════════════════════════ */
        if (mainVideo && endOverlay) {
            mainVideo.addEventListener('ended', function () {
                endOverlay.style.display = 'flex';
            });

            if (replayBtn) {
                replayBtn.addEventListener('click', function (e) {
                    e.stopPropagation();
                    endOverlay.style.display = 'none';
                    mainVideo.currentTime = 0;
                    mainVideo.play();
                });
            }
        }

    })();
    </script>

{% else %}

    <!-- Fallback: không có video → redirect thẳng bằng window.top -->
    <div class="loader-fallback">
        <div class="spinner"></div>
        <p>Đang chuyển hướng...</p>
    </div>
    <script>
        window.top.location.href = {{ link1_url | tojson if link1_url else original_url | tojson }};
    </script>
    <noscript>
        <meta http-equiv="refresh" content="0; url={{ link1_url or original_url }}" />
    </noscript>

{% endif %}

</body>
</html>
